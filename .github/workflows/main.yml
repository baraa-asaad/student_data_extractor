name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project File
        run: |
          unzip -o student_data_extractor_complete.zip
          # البحث تلقائياً عن مجلد package.json ونقل محتوياته للمجلد الرئيسي
          PKG_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -n "$PKG_PATH" ]; then
            PKG_DIR=$(dirname "$PKG_PATH")
            if [ "$PKG_DIR" != "." ]; then
              echo "Moving files from $PKG_DIR to root..."
              cp -rn $PKG_DIR/* .
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build --if-present
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-data-extractor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
