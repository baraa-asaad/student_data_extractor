name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project File
        run: |
          unzip -o student_data_extractor_complete.zip
          PKG_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -n "$PKG_PATH" ]; then
            PKG_DIR=$(dirname "$PKG_PATH")
            if [ "$PKG_DIR" != "." ]; then
              echo "Moving files from $PKG_DIR to root..."
              cp -rn $PKG_DIR/* .
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies and Build
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present
          npx cap sync android

          # إصلاح تلقائي لـ Namespace وحذف package من Manifest لمكتبات Capacitor
          python3 -c '
          import glob, re
          for p in glob.glob("node_modules/@capacitor/*/android/build.gradle"):
              with open(p, "r") as f:
                  content = f.read()
              if "namespace" not in content and "android {" in content:
                  name = p.split("/")[-3].replace("-", "_")
                  content = content.replace("android {", f"android {{\n    namespace \"com.capacitor.{name}\"")
                  with open(p, "w") as f:
                      f.write(content)

          for p in glob.glob("node_modules/@capacitor/*/android/src/main/AndroidManifest.xml"):
              with open(p, "r") as f:
                  content = f.read()
              content = re.sub(r"package=\"[^\"]*\"", "", content)
              with open(p, "w") as f:
                  f.write(content)
          '

          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-data-extractor-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
